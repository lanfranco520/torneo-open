<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Open 2026</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #0b1f17;
  color: white;
  overflow: hidden;
}

/* INTRO SCREEN */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0f2f1f, #1f4d3a);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeOut 1.5s ease forwards;
  animation-delay: 3.5s;
  z-index: 10;
}

.intro h1 {
  font-size: 60px;
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0;
  animation: titleReveal 2s ease forwards;
}

@keyframes titleReveal {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

/* Luce dorata che attraversa */
.light {
  position: absolute;
  width: 200%;
  height: 200px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
  top: 50%;
  left: -200%;
  transform: rotate(10deg);
  animation: sweep 2s ease-in-out forwards;
}

@keyframes sweep {
  to { left: 100%; }
}

/* Pallina solo CSS */
.ball {
  position: absolute;
  top: 60%;
  left: -50px;
  width: 60px;
  height: 60px;
  background: radial-gradient(circle at 30% 30%, #ffff66, #d4af37);
  border-radius: 50%;
  box-shadow: 0 0 10px #d4af37;
  animation: ballMove 2s ease-out forwards;
}

@keyframes ballMove {
  0% { left: -60px; transform: rotate(0deg); }
  100% { left: 110%; transform: rotate(720deg); }
}

/* Fade out intro */
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* CONTENUTO PRINCIPALE */
.main {
  text-align: center;
  padding-top: 150px;
  opacity: 0;
  animation: showMain 2s ease forwards;
  animation-delay: 3.5s;
}

@keyframes showMain {
  to { opacity: 1; }
}

.container {
  background: rgba(0, 0, 0, 0.45);
  display: inline-block;
  padding: 70px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

h2 {
  color: #d4af37;
  font-weight: normal;
  margin-bottom: 30px;
}

.button {
  padding: 15px 45px;
  background: #d4af37;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 8px;
  transition: 0.3s;
}

.button:hover {
  background: #e6c65c;
  transform: scale(1.07);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="light"></div>
  <div class="ball"></div>
  <h1>TORNEO OPEN 2026</h1>
</div>

<!-- CONTENUTO -->
<div class="main">
  <div class="container">
    <h1>
      <img src="CT.png" alt="Logo Circolo" style="height:70px; vertical-align:middle; margin-right:15px;">
      TORNEO OPEN 2026
    </h1>
    <h2>15 Giugno – 30 Giugno | Circolo Tennis Centrale</h2>
    <a href="tabellone.html" class="button">Consulta il Tabellone</a>
  </div>
</div>

</body>
</html>
